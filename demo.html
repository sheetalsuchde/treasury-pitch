<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidly — Mobile Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }

    html, body {
      height: 100%;
      overflow: hidden; /* lock outer scroll */
    }

    body {
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    /* Candidly wordmark above phone */
    .wordmark {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .wordmark-dot {
      width: 28px; height: 28px;
      background: #265ddc;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .wordmark-dot-inner { width: 10px; height: 10px; border-radius: 50%; background: white; }
    .wordmark-text { font-size: 18px; font-weight: 700; color: #181d29; }

    /* ── iPhone 15 Pro frame ── */
    .phone-wrap {
      position: relative;
      width: 393px;
      height: 852px;
      flex-shrink: 0;
    }

    /* Outer shell */
    .phone-shell {
      position: absolute;
      inset: 0;
      border-radius: 54px;
      background: linear-gradient(160deg, #2a2a2a 0%, #1a1a1a 50%, #111 100%);
      box-shadow:
        0 0 0 1px #444,
        0 30px 80px rgba(0,0,0,0.55),
        0 8px 24px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* Side buttons */
    .phone-shell::before {
      content: '';
      position: absolute;
      left: -3px; top: 140px;
      width: 3px; height: 36px;
      background: #333;
      border-radius: 3px 0 0 3px;
      box-shadow: 0 54px 0 #333, 0 100px 0 #333;
    }
    .phone-shell::after {
      content: '';
      position: absolute;
      right: -3px; top: 180px;
      width: 3px; height: 72px;
      background: #333;
      border-radius: 0 3px 3px 0;
    }

    /* Screen area */
    .phone-screen {
      position: absolute;
      top: 12px; left: 12px; right: 12px; bottom: 12px;
      border-radius: 44px;
      overflow: hidden;
      background: #000;
    }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .di-camera {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1.5px solid #2a2a2a;
      margin-left: 28px;
    }

    /* iframe fills screen */
    .phone-screen iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Home indicator */
    .home-indicator {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 5px;
      background: rgba(255,255,255,0.25);
      border-radius: 3px;
      z-index: 10;
    }

    /* URL hint below */
    .hint {
      margin-top: 24px;
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
      letter-spacing: 0.3px;
    }
    .hint a { color: #265ddc; text-decoration: none; }
    .hint a:hover { text-decoration: underline; }

    /* Scale down on smaller screens */
    @media (max-height: 980px) {
      .phone-wrap { transform: scale(0.88); transform-origin: top center; }
      body { padding-top: 16px; }
    }
    @media (max-height: 860px) {
      .phone-wrap { transform: scale(0.76); transform-origin: top center; }
    }
  </style>
</head>
<body>

  <!-- Wordmark -->
  <div class="wordmark">
    <div class="wordmark-dot"><div class="wordmark-dot-inner"></div></div>
    <span class="wordmark-text">Candidly</span>
  </div>

  <!-- iPhone frame -->
  <div class="phone-wrap">
    <div class="phone-shell"></div>
    <div class="phone-screen">
      <div class="dynamic-island">
        <div class="di-camera"></div>
      </div>
      <iframe src="/mobile.html" title="Candidly Mobile"></iframe>
      <div class="home-indicator"></div>
    </div>
  </div>

  <p class="hint">
    <a href="/mobile" target="_blank">treasury-pitch.vercel.app/mobile</a>
    &nbsp;·&nbsp;
    <a href="/" target="_blank">Desktop version ↗</a>
  </p>

</body>
</html>
