<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidly — Mobile Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #0d1117;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Slim top bar ── */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 200;
    }

    .wordmark {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .wordmark img { width: 22px; height: 22px; display: block; }
    .wordmark-text { font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.9); letter-spacing: -0.2px; }

    .top-bar-links {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .top-bar-links a {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      letter-spacing: 0.2px;
      transition: color 0.15s;
    }
    .top-bar-links a:hover { color: rgba(255,255,255,0.75); }
    .top-bar-links .sep { color: rgba(255,255,255,0.15); }

    /* ── Phone frame ── */
    .phone-wrap {
      position: relative;
      width: 393px;
      height: 852px;
      flex-shrink: 0;
      /* transform set by JS */
    }

    .phone-glow { display: none; }

    /* Outer shell — Black Titanium */
    .phone-shell {
      position: absolute;
      inset: 0;
      border-radius: 54px;
      background: linear-gradient(160deg, #2c2825 0%, #1c1a18 50%, #111009 100%);
      box-shadow:
        0 0 0 1px #3a3632,
        0 40px 100px rgba(0,0,0,0.85),
        0 8px 32px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* Side buttons */
    .phone-shell::before {
      content: '';
      position: absolute;
      left: -3px; top: 140px;
      width: 3px; height: 36px;
      background: #2a2724;
      border-radius: 3px 0 0 3px;
      box-shadow: 0 54px 0 #2a2724, 0 100px 0 #2a2724;
    }
    .phone-shell::after {
      content: '';
      position: absolute;
      right: -3px; top: 180px;
      width: 3px; height: 72px;
      background: #2a2724;
      border-radius: 0 3px 3px 0;
    }

    /* Screen area */
    .phone-screen {
      position: absolute;
      top: 12px; left: 12px; right: 12px; bottom: 12px;
      border-radius: 44px;
      overflow: hidden;
      background: #000;
    }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .di-camera {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1.5px solid #2a2a2a;
      margin-left: 28px;
    }

    /* iframe fills screen */
    .phone-screen iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Home indicator */
    .home-indicator {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 5px;
      background: rgba(255,255,255,0.25);
      border-radius: 3px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <!-- Slim top bar -->
  <div class="top-bar">
    <div class="wordmark">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5.25 7.5C6.49264 7.5 7.5 6.49264 7.5 5.25C7.5 4.00736 6.49264 3 5.25 3C4.00736 3 3 4.00736 3 5.25C3 6.49264 4.00736 7.5 5.25 7.5Z" fill="url(#cly0)"/>
        <path d="M18.75 14.25C19.9926 14.25 21 13.2426 21 12C21 10.7574 19.9926 9.75 18.75 9.75C17.5074 9.75 16.5 10.7574 16.5 12C16.5 13.2426 17.5074 14.25 18.75 14.25Z" fill="url(#cly1)"/>
        <path d="M18.75 21C19.9926 21 21 19.9926 21 18.75C21 17.5074 19.9926 16.5 18.75 16.5C17.5074 16.5 16.5 17.5074 16.5 18.75C16.5 19.9926 17.5074 21 18.75 21Z" fill="url(#cly2)"/>
        <rect x="9.75" y="3" width="11.25" height="4.5" rx="2.25" fill="#265DDC"/>
        <path d="M12 9.75C13.2426 9.75 14.25 10.7574 14.25 12C14.25 13.2426 13.2426 14.25 12 14.25H7.5V16.5H12C13.2426 16.5 14.25 17.5074 14.25 18.75C14.25 19.9926 13.2426 21 12 21H5.25C4.00736 21 3 19.9926 3 18.75V12C3 11.9222 3.00401 11.8453 3.01172 11.7695C3.12714 10.6352 4.08517 9.75 5.25 9.75H12Z" fill="#265DDC"/>
        <defs>
          <linearGradient id="cly0" x1="3" y1="3" x2="7.5" y2="3.00188" gradientUnits="userSpaceOnUse"><stop stop-color="#CA91D5"/><stop offset="1" stop-color="#EBC8BC"/></linearGradient>
          <linearGradient id="cly1" x1="16.5" y1="9.75" x2="21" y2="9.75188" gradientUnits="userSpaceOnUse"><stop stop-color="#CA91D5"/><stop offset="1" stop-color="#EBC8BC"/></linearGradient>
          <linearGradient id="cly2" x1="16.5" y1="16.5" x2="21" y2="16.5019" gradientUnits="userSpaceOnUse"><stop stop-color="#CA91D5"/><stop offset="1" stop-color="#EBC8BC"/></linearGradient>
        </defs>
      </svg>
      <span class="wordmark-text">Candidly</span>
    </div>
    <div class="top-bar-links">
      <a href="/">← All scenarios</a>
      <span class="sep">·</span>
      <a href="/desktop" target="_blank">Desktop view ↗</a>
    </div>
  </div>

  <!-- iPhone frame -->
  <div class="phone-wrap" id="phone-wrap">
    <div class="phone-glow"></div>
    <div class="phone-shell"></div>
    <div class="phone-screen">
      <div class="dynamic-island">
        <div class="di-camera"></div>
      </div>
      <iframe id="main-iframe" src="/app.html" title="Candidly Mobile"></iframe>
      <script>
        const qs = location.search;
        if (qs) document.getElementById('main-iframe').src = '/app.html' + qs;
      </script>
      <div class="home-indicator"></div>
    </div>
  </div>

  <script>
    function scalePhone() {
      const topBar   = 48;
      const vPad     = 32; // breathing room top+bottom
      const hPad     = 32;
      const availH   = window.innerHeight - topBar - vPad;
      const availW   = window.innerWidth - hPad;
      const scale    = Math.min(availH / 852, availW / 393);
      // Allow slight upscale on large screens (up to 1.05), clamp down on small
      const clamped  = Math.min(Math.max(scale, 0.4), 1.05);
      document.getElementById('phone-wrap').style.transform = `scale(${clamped})`;
    }
    scalePhone();
    window.addEventListener('resize', scalePhone);
  </script>

</body>
</html>
