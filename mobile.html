<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidly — Mobile Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #0d1117;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Slim top bar ── */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 200;
    }

    .wordmark {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .wordmark img { width: 22px; height: 22px; display: block; }
    .wordmark-text { font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.9); letter-spacing: -0.2px; }

    .top-bar-links {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .top-bar-links a {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      letter-spacing: 0.2px;
      transition: color 0.15s;
    }
    .top-bar-links a:hover { color: rgba(255,255,255,0.75); }
    .top-bar-links .sep { color: rgba(255,255,255,0.15); }

    /* ── Phone frame ── */
    .phone-wrap {
      position: relative;
      width: 393px;
      height: 852px;
      flex-shrink: 0;
      /* transform set by JS */
    }

    /* Ambient glow behind the phone — #31ADF5 × #B380BC */
    .phone-glow {
      position: absolute;
      inset: -80px;
      background:
        radial-gradient(ellipse at 35% 55%, rgba(49,173,245,0.28) 0%, transparent 55%),
        radial-gradient(ellipse at 65% 45%, rgba(179,128,188,0.28) 0%, transparent 55%);
      pointer-events: none;
      z-index: -1;
      filter: blur(18px);
    }

    /* Outer shell — Natural Titanium */
    .phone-shell {
      position: absolute;
      inset: 0;
      border-radius: 54px;
      background: linear-gradient(160deg, #c8c2b8 0%, #a8a29e 50%, #8f8880 100%);
      box-shadow:
        0 0 0 1px #b0aaa4,
        0 40px 100px rgba(0,0,0,0.7),
        0 8px 32px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.35);
    }

    /* Side buttons */
    .phone-shell::before {
      content: '';
      position: absolute;
      left: -3px; top: 140px;
      width: 3px; height: 36px;
      background: #9e9890;
      border-radius: 3px 0 0 3px;
      box-shadow: 0 54px 0 #9e9890, 0 100px 0 #9e9890;
    }
    .phone-shell::after {
      content: '';
      position: absolute;
      right: -3px; top: 180px;
      width: 3px; height: 72px;
      background: #9e9890;
      border-radius: 0 3px 3px 0;
    }

    /* Screen area */
    .phone-screen {
      position: absolute;
      top: 12px; left: 12px; right: 12px; bottom: 12px;
      border-radius: 44px;
      overflow: hidden;
      background: #000;
    }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .di-camera {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 1.5px solid #2a2a2a;
      margin-left: 28px;
    }

    /* iframe fills screen */
    .phone-screen iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Home indicator */
    .home-indicator {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 5px;
      background: rgba(255,255,255,0.25);
      border-radius: 3px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <!-- Slim top bar -->
  <div class="top-bar">
    <div class="wordmark">
      <img src="https://www.figma.com/api/mcp/asset/c423cb29-7ed9-4a09-beac-8b107e19eba2" alt="Candidly" />
      <span class="wordmark-text">Candidly</span>
    </div>
    <div class="top-bar-links">
      <a href="/">← All scenarios</a>
      <span class="sep">·</span>
      <a href="/desktop" target="_blank">Desktop view ↗</a>
    </div>
  </div>

  <!-- iPhone frame -->
  <div class="phone-wrap" id="phone-wrap">
    <div class="phone-glow"></div>
    <div class="phone-shell"></div>
    <div class="phone-screen">
      <div class="dynamic-island">
        <div class="di-camera"></div>
      </div>
      <iframe id="main-iframe" src="/app.html" title="Candidly Mobile"></iframe>
      <script>
        const qs = location.search;
        if (qs) document.getElementById('main-iframe').src = '/app.html' + qs;
      </script>
      <div class="home-indicator"></div>
    </div>
  </div>

  <script>
    function scalePhone() {
      const topBar   = 48;
      const vPad     = 32; // breathing room top+bottom
      const hPad     = 32;
      const availH   = window.innerHeight - topBar - vPad;
      const availW   = window.innerWidth - hPad;
      const scale    = Math.min(availH / 852, availW / 393);
      // Allow slight upscale on large screens (up to 1.05), clamp down on small
      const clamped  = Math.min(Math.max(scale, 0.4), 1.05);
      document.getElementById('phone-wrap').style.transform = `scale(${clamped})`;
    }
    scalePhone();
    window.addEventListener('resize', scalePhone);
  </script>

</body>
</html>
